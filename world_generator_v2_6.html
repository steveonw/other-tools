    const u = h < 4 ? x : y; const v = h < 4 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -2.0 * v : 2.0 * v);
  }
  fbm(x, y, octaves = 7, freq = 0.0015) {
    let total = 0, frequency = freq, amplitude = 1, maxValue = 0;
    for (let i = 0; i < octaves; i++) {
      total += this.noise2D(x * frequency, y * frequency) * amplitude;
      maxValue += amplitude; amplitude *= 0.5; frequency *= 2;
    }
    return total / maxValue;
  }
}

function getNeighbors(world, x, y) {
  const res = [];
  if (y > 0) res.push(world[y - 1][x]);
  if (y < CONFIG.HEIGHT - 1) res.push(world[y + 1][x]);
  if (x > 0) res.push(world[y][x - 1]);
  if (x < CONFIG.WIDTH - 1) res.push(world[y][x + 1]);
  return res;
}

function generateWorldData(seed, kCount, islandDensity) {
  const rand = seeded(seed);
  const noise = new SimplexNoise(rand);
  const world = Array.from({length: CONFIG.HEIGHT}, (_,y) => Array.from({length: CONFIG.WIDTH}, (_,x) => new Cell(x,y)));

  // 1. Geography
  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const cell = world[y][x];
      let h = (noise.fbm(x, y) + 1) / 2;
      const dx = (x / CONFIG.WIDTH) - 0.5, dy = (y / CONFIG.HEIGHT) - 0.5;
      const dist = Math.sqrt(dx * dx + dy * dy) * 2.1;
      
      let baseHeight = h * 100 * Math.max(0, 1 - Math.pow(dist, 2.5));
      
      if (baseHeight < CONFIG.SEA_LEVEL && baseHeight > CONFIG.SEA_LEVEL - 15) {
          const islandNoise = (noise.fbm(x, y, 4, 0.015) + 1) / 2;
          const threshold = 1 - (islandDensity / 100);
          if (islandNoise > threshold) {
              baseHeight = CONFIG.SEA_LEVEL + (islandNoise * 18);
              cell.isIsland = true;
          }
      }
      
      cell.height = baseHeight;
      const latFactor = 1 - Math.abs((y / CONFIG.HEIGHT) - 0.5) * 2;
      cell.temp = (latFactor * 60) + (noise.fbm(x, y, 3, 0.01) * 20) - (cell.height * 0.4);
      cell.moisture = (noise.fbm(x + 500, y + 500, 4, 0.002) + 1) * 50;
    }
  }

  // 2. Hydrology
  for (let i = 0; i < CONFIG.RIVER_SOURCES; i++) {
    let curr = world[Math.floor(rand() * CONFIG.HEIGHT)][Math.floor(rand() * CONFIG.WIDTH)];
    if (curr.height < 65 || curr.isIsland) continue;
    while (curr && curr.height > CONFIG.SEA_LEVEL && !curr.river) {
      curr.river = true;
      let lowest = curr;
      getNeighbors(world, curr.x, curr.y).forEach(n => { if (n.height < lowest.height) lowest = n; });
      if (lowest === curr) break;
      curr = lowest;
    }
  }

  // 3. Biomes
  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const c = world[y][x];
      if (c.height <= CONFIG.SEA_LEVEL) {
          if (c.height < 15) c.biome = 'Abyssal';
          else if (c.height < 28) c.biome = 'DeepOcean';
          else c.biome = 'Ocean';
      }
      else if (c.height > 90) c.biome = 'IcePeaks';
      else if (c.height > 78) c.biome = 'Mountains';
      else if (c.temp < 5) c.biome = 'Tundra';
      else if (c.temp < 15) c.biome = 'Taiga';
      else if (c.moisture < 25) c.biome = 'Desert';
      else if (c.moisture < 45) c.biome = 'Plains';
      else if (c.height < 42) c.biome = 'Coast';
      else c.biome = 'Forest';
    }
  }

  // 4. Civilizations
  const SYLLABLES = ["Vorn", "Kael", "Aet", "Zir", "Mor", "Thy", "Oli", "Xan", "Eld", "Bel", "Drak", "Sol", "Lun", "Fen", "Yur", "Grim", "Val", "Nar", "Quin", "Zal", "Thrax", "Ur", "Zen"];
  const K_TYPES = ["Kingdom", "Empire", "Dominion", "Republic", "Highland", "Dynasty", "League", "Covenant", "Unity"];
  
  const capitals = [];
  const kingdomColors = Array.from({length: kCount}, (_, i) => `hsl(${(i * (360/kCount) + (seed % 360)) % 360}, 65%, 45%)`);
  const kingdomNames = Array.from({length: kCount}, () => {
    let base = SYLLABLES[Math.floor(rand()*SYLLABLES.length)];
    let suffix = SYLLABLES[Math.floor(rand()*SYLLABLES.length)].toLowerCase();
    return `${base}${suffix} ${K_TYPES[Math.floor(rand()*K_TYPES.length)]}`;
  });

  for (let i = 0; i < kCount; i++) {
    let attempts = 0;
    while (attempts < 300) {
      let rx = Math.floor(rand() * CONFIG.WIDTH);
      let ry = Math.floor(rand() * CONFIG.HEIGHT);
      let cell = world[ry][rx];
      if (cell.height > CONFIG.SEA_LEVEL + 5 && cell.height < 75 && cell.temp > 10 && !capitals.some(c => Math.hypot(c.x-rx, c.y-ry) < 65)) {
        cell.settlement = 'Capital';
        cell.kingdom = i;
        cell.kingdomColor = kingdomColors[i];
        cell.kingdomName = kingdomNames[i];
        cell.name = SYLLABLES[Math.floor(rand()*SYLLABLES.length)] + (rand() > 0.5 ? "ia" : "gard");
        capitals.push(cell);
        break;
      }
      attempts++;
    }
  }

  // Expansion
  let queue = capitals.map(c => ({cell: c, k: c.kingdom}));
  while (queue.length > 0) {
    const nextQueue = [];
    queue.forEach(q => {
      getNeighbors(world, q.cell.x, q.cell.y).forEach(n => {
        if (n.height > CONFIG.SEA_LEVEL && n.kingdom === null) {
          n.kingdom = q.k;
          n.kingdomColor = kingdomColors[q.k];
          n.kingdomName = kingdomNames[q.k];
          nextQueue.push({cell: n, k: q.k});
        }
      });
    });
    queue = nextQueue;
  }

  // Cities and Towns
  world.flat().forEach(c => {
    if (c.height > CONFIG.SEA_LEVEL && c.settlement === null) {
      let chance = CONFIG.SETTLEMENT_DENSITY;
      if (c.river) chance *= 6.5;
      if (c.biome === 'Coast') chance *= 5;
      if (c.isIsland) chance *= 1.8;
      if (rand() < chance) {
        c.settlement = rand() > 0.3 ? 'Town' : 'City';
        const suffixes = ["port", "bridge", "bay", "fall", "wood", "reef", "haven", "stead", "keep", "marsh"];
        c.name = SYLLABLES[Math.floor(rand()*SYLLABLES.length)] + suffixes[Math.floor(rand()*suffixes.length)];
      }
    }
  });

  return world;
}

/** RENDERING **/
let CURRENT_WORLD = null;
let VIEW_MODE = 'physical';

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
}

function render(world) {
  const canvas = document.getElementById("map");
  const ctx = canvas.getContext("2d");
  canvas.width = CONFIG.WIDTH;
  canvas.height = CONFIG.HEIGHT;

  const biomes = {
    Abyssal: "#0a1e3d", DeepOcean: "#152d52", Ocean: "#1b3c73", Coast: "#e8d1a7",
    Desert: "#f0dfb1", Plains: "#92b84a", Forest: "#1a5e2b", Tundra: "#a8c0bf",
    Taiga: "#426b3e", Mountains: "#7a7a7a", IcePeaks: "#d9f0ff"
  };

  const imgData = ctx.createImageData(CONFIG.WIDTH, CONFIG.HEIGHT);
  const data = imgData.data;

  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const c = world[y][x];
      let [r, g, b] = hexToRgb(biomes[c.biome]);

      // Simple Shading
      if (y > 0 && x > 0 && c.height > CONFIG.SEA_LEVEL) {
          const hLeft = world[y][x-1].height;
          const hUp = world[y-1][x].height;
          const slope = (c.height - hLeft) + (c.height - hUp);
          const shade = 1 + (slope * 0.07);
          r = Math.min(255, r * shade);
          g = Math.min(255, g * shade);
          b = Math.min(255, b * shade);
      }

      // Shoreline blending
      if (c.height <= CONFIG.SEA_LEVEL && c.height > CONFIG.SEA_LEVEL - 3) {
          r = r * 0.8 + 100 * 0.2; g = g * 0.8 + 180 * 0.2; b = b * 0.8 + 255 * 0.2;
      }

      // Political Overlay
      if (VIEW_MODE === 'political' && c.kingdomColor && c.height > CONFIG.SEA_LEVEL) {
        const tempCtx = document.createElement('canvas').getContext('2d');
        tempCtx.fillStyle = c.kingdomColor;
        const colorStr = tempCtx.fillStyle;
        const kr = parseInt(colorStr.slice(1,3), 16), kg = parseInt(colorStr.slice(3,5), 16), kb = parseInt(colorStr.slice(5,7), 16);
        r = r * 0.3 + kr * 0.7; g = g * 0.3 + kg * 0.7; b = b * 0.3 + kb * 0.7;
      }

      const idx = (y * CONFIG.WIDTH + x) * 4;
      data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
      
      // Rivers
      if (c.river && c.height > CONFIG.SEA_LEVEL) { 
          data[idx] = 60; data[idx+1] = 140; data[idx+2] = 200; 
      }
      
      // Borders
      if (VIEW_MODE === 'political' && c.height > CONFIG.SEA_LEVEL) {
          if ((x < CONFIG.WIDTH - 1 && world[y][x+1].kingdom !== c.kingdom) || 
              (y < CONFIG.HEIGHT - 1 && world[y+1][x].kingdom !== c.kingdom)) {
              data[idx] = 20; data[idx+1] = 20; data[idx+2] = 20; 
          }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Labels & Markers
  ctx.textAlign = "center";
  ctx.shadowColor = "rgba(0,0,0,0.9)";
  ctx.shadowBlur = 5;
  world.flat().forEach(c => {
    if (c.settlement) {
      if (c.settlement === 'Capital') {
        ctx.fillStyle = "#ffd700"; ctx.font = "bold 18px serif"; ctx.fillText("✥", c.x, c.y);
        ctx.fillStyle = "white"; ctx.font = "bold 13px 'Segoe UI'"; ctx.fillText(c.name.toUpperCase(), c.x, c.y - 14);
      } else if (c.settlement === 'City') {
        ctx.fillStyle = "white"; ctx.font = "12px sans-serif"; ctx.fillText("○", c.x, c.y);
        ctx.font = "10px 'Segoe UI'"; ctx.fillText(c.name, c.x, c.y - 12);
      } else if (c.settlement === 'Town') {
        ctx.fillStyle = "#ddd"; ctx.font = "9px sans-serif"; ctx.fillText("•", c.x, c.y);
      }
    }
  });
}

const mapCanvas = document.getElementById("map");
const inspector = document.getElementById("inspector");

mapCanvas.onmousemove = (e) => {
    if (!CURRENT_WORLD) return;
    const rect = mapCanvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (CONFIG.WIDTH / rect.width));
    const y = Math.floor((e.clientY - rect.top) * (CONFIG.HEIGHT / rect.height));

    if (CURRENT_WORLD[y] && CURRENT_WORLD[y][x]) {
        const c = CURRENT_WORLD[y][x];
        inspector.style.display = "block";
        inspector.style.left = (e.clientX + 15) + "px";
        inspector.style.top = (e.clientY + 15) + "px";
        inspector.innerHTML = `
            <div class="inspector-row"><span class="inspector-label">Biome:</span> <span class="inspector-val">${c.biome} ${c.isIsland ? '(Island)' : ''}</span></div>
            <div class="inspector-row"><span class="inspector-label">Elevation:</span> <span class="inspector-val">${Math.round(c.height * 50)}m</span></div>
            <div class="inspector-row"><span class="inspector-label">Climate:</span> <span class="inspector-val">${Math.round(c.temp)}°C / ${Math.round(c.moisture)}% Hum.</span></div>
            ${c.kingdomName ? `<div class="inspector-row" style="border-top:1px solid #444; margin-top:8px; padding-top:8px;"><span class="inspector-label">Sovereignty:</span> <span class="inspector-val" style="color:${c.kingdomColor}">${c.kingdomName}</span></div>` : ''}
            ${c.name ? `<div class="inspector-row"><span class="inspector-label">Settlement:</span> <span class="inspector-val">${c.name} (${c.settlement})</span></div>` : ''}
        `;
    }
};
mapCanvas.onmouseleave = () => inspector.style.display = "none";

async function startGen() {
  const seedInput = document.getElementById("seedInput");
  let seed = parseInt(seedInput.value);
  if (isNaN(seed)) {
      seed = Math.floor(Math.random() * 999999) + 1;
      seedInput.value = seed;
  }
  
  const kCount = parseInt(document.getElementById("kCountRange").value);
  const islandDensity = parseInt(document.getElementById("islandRange").value);
  
  document.getElementById("status").innerText = "Generating world data...";
  await new Promise(r => setTimeout(r, 60));
  CURRENT_WORLD = generateWorldData(seed, kCount, islandDensity);
  render(CURRENT_WORLD);
  document.getElementById("status").innerText = `World Ready | Seed: ${seed}`;
}

document.getElementById("kCountRange").oninput = function() { document.getElementById("kCountVal").innerText = this.value; };
document.getElementById("islandRange").oninput = function() { document.getElementById("islandVal").innerText = this.value + "%"; };
document.getElementById("regenerate").onclick = startGen;
document.getElementById("viewPhysical").onclick = function() { VIEW_MODE = 'physical'; this.classList.add('active'); document.getElementById("viewPolitical").classList.remove('active'); render(CURRENT_WORLD); };
document.getElementById("viewPolitical").onclick = function() { VIEW_MODE = 'political'; this.classList.add('active'); document.getElementById("viewPhysical").classList.remove('active'); render(CURRENT_WORLD); };
document.getElementById("exportImage").onclick = () => {
    const link = document.createElement('a');
    link.download = `atlas_v26_seed_${document.getElementById("seedInput").value}.png`;
    link.href = mapCanvas.toDataURL("image/png");
    link.click();
};

// Download logic for entire HTML file
document.getElementById("exportHTML").onclick = () => {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'world_generator_v2_6.html';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
};

startGen();
</script>

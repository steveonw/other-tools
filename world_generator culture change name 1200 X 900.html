<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Generator v4.0 - Master Dataset</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --accent: #3b82f6;
      --text: #e0e0e0;
      --border: #333;
    }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: row;
      gap: 15px;
      height: 100vh;
      overflow: hidden;
      box-sizing: border-box;
    }

    #sidebar {
      width: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      padding: 15px;
      gap: 15px;
      overflow-y: auto;
    }

    #main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow: hidden;
    }

    h1 { margin: 0; font-size: 1.2rem; color: #fff; }
    label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; display: block; }
    
    .control-block { border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    
    button {
      padding: 8px 12px;
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
    }
    button.active { background: var(--accent); border-color: #60a5fa; }
    button.gen-btn { width: 100%; background: var(--accent); margin-top: 10px; border: none; }

    input[type="range"], select, input[type="number"] {
      width: 100%;
      background: #000;
      color: #fff;
      border: 1px solid #444;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      box-sizing: border-box;
    }

    .kingdom-item {
      background: #252525;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid var(--k-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .k-header { font-weight: bold; display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 0.85rem; }
    .k-sub { opacity: 0.7; font-size: 0.7rem; }
    
    .k-select {
        font-size: 0.7rem;
        padding: 4px;
        background: #111;
        border-color: #555;
    }

    .canvas-container {
      position: relative;
      flex: 1;
      background: #000;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: auto; cursor: crosshair; }

    #inspector {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h1>Atlas v4.0</h1>
    
    <div class="control-block">
      <label>Seed Generator</label>
      <input type="number" id="seedInput" placeholder="Leave blank for random">
      <button id="regenBtn" class="gen-btn">Generate World</button>
      <button id="exportPngBtn" class="gen-btn" style="background:#16a34a;">Export PNG</button>
    </div>

    <div class="control-block">
      <label>Global Rules</label>
      <div style="margin-bottom: 12px;">
        <label style="text-transform:none;">Kingdom Density: <span id="kVal">12</span></label>
        <input type="range" id="kRange" min="2" max="25" value="12">
      </div>
      <div>
        <label style="text-transform:none;">Sea Level</label>
        <input type="range" id="seaRange" min="20" max="60" value="38">
      </div>
    </div>
     <div style="margin-top: 12px;">
      <label style="text-transform:none;">Island Density: <span id="islandVal">35%</span></label>
     <input type="range" id="islandRange" min="0" max="100" value="35">
  </div>
    <div class="control-block">
      <label>Individual Kingdoms</label>
      <div id="kingdom-list"></div>
    </div>
  </div>

  <div id="main-view">
    <div style="display:flex; gap:10px;">
        <button id="viewPhys" class="active">Terrain View</button>
        <button id="viewPol">Borders & Cultures</button>
    </div>
    
    <div class="canvas-container">

      <canvas id="mapCanvas"></canvas>
    </div>
  </div>

function seeded(s) { return () => { s = Math.sin(s) * 10000; return s - Math.floor(s); }; }

class SimplexNoise {
  constructor(rand) {
    this.p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) this.p[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [this.p[i], this.p[j]] = [this.p[j], this.p[i]];
    }
    this.perm = new Uint8Array(512);
    for (let i = 0; i < 512; i++) this.perm[i] = this.p[i & 255];
  }
  noise2D(xin, yin) {
    let n0, n1, n2;
    const F2 = 0.5 * (Math.sqrt(3.0) - 1.0);
    const s = (xin + yin) * F2;
    const i = Math.floor(xin + s);
    const j = Math.floor(yin + s);
    const G2 = (3.0 - Math.sqrt(3.0)) / 6.0;
    const t = (i + j) * G2;
    const x0 = xin - (i - t);
    const y0 = yin - (j - t);
    let i1, j1;
    if (x0 > y0) { i1 = 1; j1 = 0; } else { i1 = 0; j1 = 1; }
    const x1 = x0 - i1 + G2;
    const y1 = y0 - j1 + G2;
    const x2 = x0 - 1.0 + 2.0 * G2;
    const y2 = y0 - 1.0 + 2.0 * G2;
    const ii = i & 255; const jj = j & 255;

    let t0 = 0.5 - x0 * x0 - y0 * y0;
    if (t0 < 0) n0 = 0.0;
    else { t0 *= t0; n0 = t0 * t0 * this.grad(this.perm[ii + this.perm[jj]], x0, y0); }

    let t1 = 0.5 - x1 * x1 - y1 * y1;
    if (t1 < 0) n1 = 0.0;
    else { t1 *= t1; n1 = t1 * t1 * this.grad(this.perm[ii + i1 + this.perm[jj + j1]], x1, y1); }

    let t2 = 0.5 - x2 * x2 - y2 * y2;
    if (t2 < 0) n2 = 0.0;
    else { t2 *= t2; n2 = t2 * t2 * this.grad(this.perm[ii + 1 + this.perm[jj + 1]], x2, y2); }

    return 70.0 * (n0 + n1 + n2);
  }
  grad(hash, x, y) {
    const h = hash & 7;
    const u = h < 4 ? x : y; const v = h < 4 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -2.0 * v : 2.0 * v);
  }
  fbm(x, y, octaves = 7, freq = 0.0018) {
    let total = 0, frequency = freq, amplitude = 1, maxValue = 0;
    for (let i = 0; i < octaves; i++) {
      total += this.noise2D(x * frequency, y * frequency) * amplitude;
      maxValue += amplitude; amplitude *= 0.5; frequency *= 2;
    }
    return total / maxValue;
  }
}

function getNeighbors(world, x, y) {
  const res = [];
  if (y > 0) res.push(world[y - 1][x]);
  if (y < CONFIG.HEIGHT - 1) res.push(world[y + 1][x]);
  if (x > 0) res.push(world[y][x - 1]);
  if (x < CONFIG.WIDTH - 1) res.push(world[y][x + 1]);
  return res;
}

function generate() {
  let seed = parseInt(document.getElementById("seedInput").value);
  if (isNaN(seed)) {
    seed = Math.floor(Math.random() * 999999);
    document.getElementById("seedInput").value = seed;
  }

  const kCount = parseInt(document.getElementById("kRange").value);
  const seaLevel = parseInt(document.getElementById("seaRange").value);
  const islandDensity = parseInt(document.getElementById("islandRange").value);

  RNG = seeded(seed);
  const noise = new SimplexNoise(RNG);

  WORLD = Array.from({ length: CONFIG.HEIGHT }, (_, y) =>
    Array.from({ length: CONFIG.WIDTH }, (_, x) => new Cell(x, y))
  );

  // 1) Geography + climate
  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const cell = WORLD[y][x];

      let h = (noise.fbm(x, y) + 1) / 2; // 0..1
      const dx = (x / CONFIG.WIDTH) - 0.5, dy = (y / CONFIG.HEIGHT) - 0.5;
      const dist = Math.sqrt(dx * dx + dy * dy) * 2.1;

      let baseHeight = h * 100 * Math.max(0, 1 - Math.pow(dist, 2.5));

      // v2.6 island band just below sea level
      if (baseHeight < seaLevel && baseHeight > seaLevel - 15) {
        const islandNoise = (noise.fbm(x, y, 4, 0.015) + 1) / 2;
        const threshold = 1 - (islandDensity / 100);
        if (islandNoise > threshold) {
          baseHeight = seaLevel + (islandNoise * 18);
          cell.isIsland = true;
        }
      }

      cell.height = baseHeight;

      const latFactor = 1 - Math.abs((y / CONFIG.HEIGHT) - 0.5) * 2;
      cell.temp = (latFactor * 60) + (noise.fbm(x, y, 3, 0.01) * 20) - (cell.height * 0.4);
      cell.moisture = (noise.fbm(x + 500, y + 500, 4, 0.002) + 1) * 50;
    }
  }

  // 2) Rivers
  for (let i = 0; i < CONFIG.RIVER_SOURCES; i++) {
    let curr = WORLD[Math.floor(RNG() * CONFIG.HEIGHT)][Math.floor(RNG() * CONFIG.WIDTH)];
    if (curr.height < (seaLevel + 27) || curr.isIsland) continue; // v2.6: 65 when sea=38

    while (curr && curr.height > seaLevel && !curr.river) {
      curr.river = true;
      let lowest = curr;
      getNeighbors(WORLD, curr.x, curr.y).forEach(n => { if (n.height < lowest.height) lowest = n; });
      if (lowest === curr) break;
      curr = lowest;
    }
  }

  // 3) Biomes
  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const c = WORLD[y][x];

      if (c.height <= seaLevel) {
        if (c.height < 15) c.biome = "Abyssal";
        else if (c.height < 28) c.biome = "DeepOcean";
        else c.biome = "Ocean";
      } else if (c.height > 90) c.biome = "IcePeaks";
      else if (c.height > 78) c.biome = "Mountains";
      else if (c.temp < 5) c.biome = "Tundra";
      else if (c.temp < 15) c.biome = "Taiga";
      else if (c.moisture < 25) c.biome = "Desert";
      else if (c.moisture < 45) c.biome = "Plains";
      else if (c.height < seaLevel + 4) c.biome = "Coast";
      else c.biome = "Forest";
    }
  }

  // 4) Culture Kingdoms (your v4 logic)
  KINGDOMS = [];
  const capitals = [];
  const cultureKeys = Object.keys(CULTURES);

  for (let i = 0; i < kCount; i++) {
    let attempts = 0;
    while (attempts < 1200) {
      const rx = Math.floor(RNG() * CONFIG.WIDTH);
      const ry = Math.floor(RNG() * CONFIG.HEIGHT);
      const c = WORLD[ry][rx];

      // nicer placement like v2.6: mid-elevation, decent temp, not too close, not deep island
      if (
        c.height > seaLevel + 5 &&
        c.height < 75 &&
        c.temp > 10 &&
        !capitals.some(p => Math.hypot(p.x - rx, p.y - ry) < 65)
      ) {
        const cultureName = cultureKeys[i % cultureKeys.length];
        const cult = CULTURES[cultureName];

        const kData = {
          id: i,
          color: `hsl(${(i * (360 / kCount)) % 360}, 65%, 45%)`,
          culture: cultureName,
          name: cult.kingdoms[Math.floor(RNG() * cult.kingdoms.length)],
          capital: cult.capitals[Math.floor(RNG() * cult.capitals.length)]
        };

        KINGDOMS.push(kData);

        c.kingdom = i;
        c.settlement = "Capital";
        c.name = kData.capital;

        capitals.push({ x: rx, y: ry, id: i });
        break;
      }
      attempts++;
    }
  }

  // Expansion (4-neighbor flood fill)
  let queue = capitals.map(p => ({ x: p.x, y: p.y, id: p.id }));
  while (queue.length > 0) {
    const next = [];
    queue.forEach(p => {
      [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
        const nx = p.x + d[0], ny = p.y + d[1];
        if (nx >= 0 && nx < CONFIG.WIDTH && ny >= 0 && ny < CONFIG.HEIGHT) {
          const cell = WORLD[ny][nx];
          if (cell.height > seaLevel && cell.kingdom === null) {
            cell.kingdom = p.id;
            next.push({ x: nx, y: ny, id: p.id });
          }
        }
      });
    });
    queue = next;
  }

  // Settlements (v2.6-style density, but culture town names)
  WORLD.flat().forEach(c => {
    if (c.height > seaLevel && c.settlement === null && c.kingdom !== null) {
      let chance = CONFIG.SETTLEMENT_DENSITY;
      if (c.river) chance *= 6.5;
      if (c.biome === "Coast") chance *= 5;
      if (c.isIsland) chance *= 1.8;

      if (RNG() < chance) {
        const k = KINGDOMS[c.kingdom];
        const pool = CULTURES[k.culture].towns;
        c.settlement = (RNG() > 0.3) ? "Town" : "City";
        c.name = pool[Math.floor(RNG() * pool.length)];
      }
    }
  });

  updateKingdomUI();
  render();
}

function updateKingdomNames(kingdomIndex, newCulture) {
  const k = KINGDOMS[kingdomIndex];
  k.culture = newCulture;
  const cult = CULTURES[newCulture];

  // Pick new names (use RNG so it's consistent with the seed)
  k.name = cult.kingdoms[Math.floor(RNG() * cult.kingdoms.length)];
  k.capital = cult.capitals[Math.floor(RNG() * cult.capitals.length)];

  // Update cells (capital + towns inside this kingdom)
  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const c = WORLD[y][x];
      if (c.kingdom !== kingdomIndex) continue;

      if (c.settlement === "Capital") {
        c.name = k.capital;
      } else if (c.settlement === "Town" || c.settlement === "City") {
        c.name = cult.towns[Math.floor(RNG() * cult.towns.length)];
      }
    }
  }

  updateKingdomUI();
  render();
}
 


function updateKingdomUI() {
  const container = document.getElementById("kingdom-list");
  container.innerHTML = "";
  
  KINGDOMS.forEach(k => {
    const div = document.createElement("div");
    div.className = "kingdom-item";
    div.style.setProperty("--k-color", k.color);
    
    let options = Object.keys(CULTURES).map(cName => 
        `<option value="${cName}" ${cName === k.culture ? 'selected' : ''}>${cName}</option>`
    ).join('');

    div.innerHTML = `
        <div class="k-header">
            <span>${k.name}</span>
            <span style="opacity:0.5; font-size: 0.6rem">ID ${k.id+1}</span>
        </div>
        <div class="k-sub">Seat: ${k.capital}</div>
        <select class="k-select" onchange="updateKingdomNames(${k.id}, this.value)">
            ${options}
        </select>
    `;
    container.appendChild(div);
  });
}

function render() {
  const canvas = document.getElementById("mapCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = CONFIG.WIDTH;
  canvas.height = CONFIG.HEIGHT;

  const seaLevel = parseInt(document.getElementById("seaRange").value);

  // Precompute kingdom RGB once per render (fast)
  const kingdomRGB = KINGDOMS.map(k => hexToRgb(k.color));

  const imgData = ctx.createImageData(CONFIG.WIDTH, CONFIG.HEIGHT);
  const data = imgData.data;

  for (let y = 0; y < CONFIG.HEIGHT; y++) {
    for (let x = 0; x < CONFIG.WIDTH; x++) {
      const c = WORLD[y][x];
      let base = BIOMES[c.biome] || BIOMES.Ocean;

      let rgb = hexToRgb(base);
      let r = rgb.r, g = rgb.g, b = rgb.b;

      // Simple shading on land
      if (y > 0 && x > 0 && c.height > seaLevel) {
        const hLeft = WORLD[y][x - 1].height;
        const hUp = WORLD[y - 1][x].height;
        const slope = (c.height - hLeft) + (c.height - hUp);
        const shade = 1 + (slope * 0.07);
        r = Math.min(255, r * shade);
        g = Math.min(255, g * shade);
        b = Math.min(255, b * shade);
      }

      // Shoreline blending band
      if (c.height <= seaLevel && c.height > seaLevel - 3) {
        r = r * 0.8 + 100 * 0.2;
        g = g * 0.8 + 180 * 0.2;
        b = b * 0.8 + 255 * 0.2;
      }

      // Political overlay
      if (VIEW_MODE === "political" && c.kingdom !== null && c.height > seaLevel) {
        const kcol = kingdomRGB[c.kingdom];
        r = r * 0.3 + kcol.r * 0.7;
        g = g * 0.3 + kcol.g * 0.7;
        b = b * 0.3 + kcol.b * 0.7;
      }

      const idx = (y * CONFIG.WIDTH + x) * 4;
      data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; data[idx + 3] = 255;

      // Rivers
      if (c.river && c.height > seaLevel) {
        data[idx] = 60; data[idx + 1] = 140; data[idx + 2] = 200;
      }

      // Borders
      if (VIEW_MODE === "political" && c.height > seaLevel) {
        if (
          (x < CONFIG.WIDTH - 1 && WORLD[y][x + 1].kingdom !== c.kingdom) ||
          (y < CONFIG.HEIGHT - 1 && WORLD[y + 1][x].kingdom !== c.kingdom)
        ) {
          data[idx] = 20; data[idx + 1] = 20; data[idx + 2] = 20;
        }
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  // Labels & markers
  ctx.textAlign = "center";
  ctx.shadowColor = "rgba(0,0,0,0.9)";
  ctx.shadowBlur = 5;

  WORLD.flat().forEach(c => {
    if (!c.settlement) return;

    if (c.settlement === "Capital") {
      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 16px serif";
      ctx.fillText("✥", c.x, c.y);
      ctx.fillStyle = "white";
      ctx.font = "bold 12px Inter";
      ctx.fillText(c.name.toUpperCase(), c.x, c.y - 14);
    } else if (c.settlement === "City") {
      ctx.fillStyle = "white";
      ctx.font = "12px sans-serif";
      ctx.fillText("○", c.x, c.y);
      ctx.font = "10px Inter";
      ctx.fillText(c.name, c.x, c.y - 12);
    } else if (c.settlement === "Town") {
      ctx.fillStyle = "#ddd";
      ctx.font = "9px sans-serif";
      ctx.fillText("•", c.x, c.y);
    }
  });
}

function hexToRgb(hex) {
  if(hex.startsWith('rgb')) { const rgb = hex.match(/\d+/g); return {r: +rgb[0], g: +rgb[1], b: +rgb[2]}; }
  if(hex.startsWith('hsl')) {
    const t = document.createElement('div'); t.style.color = hex; document.body.appendChild(t);
    const rgb = getComputedStyle(t).color.match(/\d+/g); document.body.removeChild(t);
    return {r: +rgb[0], g: +rgb[1], b: +rgb[2]};
  }
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:0,g:0,b:0};
}

function lerpColor(a, b, amount) {
  const c1 = hexToRgb(a), c2 = hexToRgb(b);
  return `rgb(${Math.round(c1.r + (c2.r-c1.r)*amount)}, ${Math.round(c1.g + (c2.g-c1.g)*amount)}, ${Math.round(c1.b + (c2.b-c1.b)*amount)})`;
}

function exportPNGWithLegend() {
  const map = document.getElementById("mapCanvas");

  // make sure the on-screen canvas is current
  render();

  const modeForFile = VIEW_MODE; // "terrain" or "political"
  const seed = document.getElementById("seedInput").value || "seed";

  // pick legend content based on mode
  const legendType = (modeForFile === "political") ? "kingdoms" : "biomes";

  const legendPadding = 18;
  const legendHeight = 190;

  const out = document.createElement("canvas");
  out.width = map.width;
  out.height = map.height + legendHeight;

  const ctx = out.getContext("2d");

  // draw map
  ctx.drawImage(map, 0, 0);

  // legend background
  ctx.fillStyle = "rgba(10,10,10,0.95)";
  ctx.fillRect(0, map.height, out.width, legendHeight);

  // legend title
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px Inter, sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  const title =
    legendType === "kingdoms"
      ? `Kingdom Legend (political view)`
      : `Biome Legend (terrain view)`;

  ctx.fillText(title, legendPadding, map.height + 10);

  // layout helpers
  const startY = map.height + 40;
  const rowH = 20;
  const swatch = 14;
  const gap = 10;

  // build items
  let items = [];
  if (legendType === "kingdoms") {
    items = KINGDOMS.map((k, i) => ({
      label: `${i + 1}. ${k.name} (${k.culture})`,
      color: k.color
    }));
  } else {
    const biomeOrder = Object.keys(BIOMES);
    items = biomeOrder.map(b => ({
      label: b,
      color: BIOMES[b]
    }));
  }

  // columns
  const colW = legendType === "kingdoms" ? 340 : 240;
  const cols = Math.max(1, Math.floor((out.width - legendPadding * 2) / colW));
  const rowsPerCol = Math.floor((legendHeight - 55) / rowH);

  ctx.font = "12px Inter, sans-serif";
  ctx.textBaseline = "top";

  items.forEach((it, i) => {
    const col = Math.floor(i / rowsPerCol);
    const row = i % rowsPerCol;
    if (col >= cols) return;

    const x = legendPadding + col * colW;
    const y = startY + row * rowH;

    ctx.fillStyle = it.color;
    ctx.fillRect(x, y + 2, swatch, swatch);

    ctx.fillStyle = "#e5e5e5";
    ctx.fillText(it.label, x + swatch + gap, y);
  });

  // download
  const link = document.createElement("a");
  link.download = `world_${seed}_${modeForFile}.png`;
  link.href = out.toDataURL("image/png");
  link.click();
}

// event hooks
document.getElementById("regenBtn").onclick = generate;

document.getElementById("exportPngBtn").onclick = exportPNGWithLegend;

document.getElementById("kRange").oninput = function() {
  document.getElementById("kVal").innerText = this.value;
};

document.getElementById("viewPhys").onclick = function() {
  VIEW_MODE = 'terrain';
  this.classList.add('active');
  document.getElementById("viewPol").classList.remove('active');
  render();
};

document.getElementById("viewPol").onclick = function() {
  VIEW_MODE = 'political';
  this.classList.add('active');
  document.getElementById("viewPhys").classList.remove('active');
  render();
};

document.getElementById("islandRange").oninput = function () {
  document.getElementById("islandVal").innerText = this.value + "%";
};

generate();


const canvas = document.getElementById("mapCanvas");
const ins = document.getElementById("inspector");
canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) * (CONFIG.WIDTH / rect.width));
    const y = Math.floor((e.clientY - rect.top) * (CONFIG.HEIGHT / rect.height));
    if(WORLD[y] && WORLD[y][x]) {
        const c = WORLD[y][x];
        ins.style.display = "block"; ins.style.left = (e.clientX + 15) + "px"; ins.style.top = (e.clientY + 15) + "px";
        const k = c.kingdom !== null ? KINGDOMS[c.kingdom] : null;
        ins.innerHTML = `Terrain: <b>${c.biome}</b><br>${k ? 'Kingdom: ' + k.name + '<br>Culture: ' + k.culture : 'Terra Incognita'}`;
    }
};
canvas.onmouseleave = () => ins.style.display = "none";
</script>
